spring:
  application:
    name: server
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      data-source-properties:
        prepareThreshold: 0
        preferQueryMode: simple
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:levdev1010@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  token:
    validity: 18000
    prefix: Bearer
  refresh-token:
    validity: 2592000
  signing:
    key: ${JWT_SIGNING_KEY}
  authorities:
    key: roles
  header:
    string: Authorization

server:
  port: ${PORT:8080}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://law-connect2-0.vercel.app}
  mail:
    from: ${MAIL_FROM:levdev1010@gmail.com}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

